# Render Blueprint — backend API only
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: chabad-portal-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: FRONTEND_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: SESSION_CLOCK_SKEW_MS
        value: "300000"
      - key: MAKE_WEBHOOK_URL
        sync: false
      - key: MAKE_PROFILE_UPDATE_WEBHOOK_URL
        sync: false
      - key: MAKE_PORTAL_DATA_WEBHOOK_URL
        sync: false
      - key: MAKE_PAYMENTS_WEBHOOK_URL
        sync: false
      - key: MAKE_QUICK_PAYMENT_WEBHOOK_URL
        sync: false
      - key: MAKE_STRIPE_PAYMENT_WEBHOOK_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RECURRING_INVOICE_NAME
        sync: false
      - key: RECURRING_LETTERHEAD_NAME
        sync: false
