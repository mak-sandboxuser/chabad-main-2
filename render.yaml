# Render Blueprint
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: chabad-portal-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: FRONTEND_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: SESSION_CLOCK_SKEW_MS
        value: "300000"
      - key: MAKE_WEBHOOK_URL
        sync: false
      - key: MAKE_PROFILE_UPDATE_WEBHOOK_URL
        sync: false
      - key: MAKE_PORTAL_DATA_WEBHOOK_URL
        sync: false
      - key: MAKE_HOUSEHOLD_DATA_WEBHOOK_URL
        sync: false
      - key: MAKE_PAYMENTS_WEBHOOK_URL
        sync: false
      - key: MAKE_QUICK_PAYMENT_WEBHOOK_URL
        sync: false
      - key: MAKE_STRIPE_PAYMENT_WEBHOOK_URL
        sync: false
      - key: MAKE_HOUSEHOLD_SEARCH_CONTACTS_WEBHOOK_URL
        sync: false
      - key: MAKE_ADD_FAMILY_MEMBER_WEBHOOK_URL
        sync: false
      - key: MAKE_HOUSEHOLD_ROLE_WEBHOOK_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RECURRING_INVOICE_NAME
        sync: false
      - key: RECURRING_LETTERHEAD_NAME
        sync: false

  # Static Site — SPA: public/_redirects sends /verify → index.html
  - type: web
    name: church-front
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_API_URL
        sync: false
      - key: VITE_APP_URL
        value: https://church-front-6bdw.onrender.com
